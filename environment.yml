name: llm_env
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # ── Web API ───────────────────────────────────────
    - fastapi==0.135.1
    - uvicorn==0.41.0
    - pydantic==2.12.5
    - starlette==0.52.1
    - sse-starlette==3.2.0
    - python-multipart==0.0.22

    # ── HTTP clients ──────────────────────────────────
    - requests==2.32.5
    - httpx
    - aiohttp==3.13.2

    # ── LlamaIndex core RAG framework ─────────────────
    - llama-index-core==0.14.15
    - llama-index-embeddings-ollama==0.8.6
    - llama-index-llms-openai-like==0.6.0
    - llama-index-retrievers-bm25==0.6.5
    - llama-index-readers-file==0.5.6

    # ── Vector DB / Memory ────────────────────────────
    - chromadb==1.5.2

    # ── PDF parsing ───────────────────────────────────
    - pymupdf==1.27.1

    # ── ML / Reranker ─────────────────────────────────
    - torch==2.10.0
    - transformers==5.3.0
    - sentence-transformers==5.2.3
    - flagembedding==1.3.5
    - rank-bm25==0.2.2
    - numpy==2.4.2

    # ── Utilities ─────────────────────────────────────
    - pillow==12.1.1
    - nltk==3.9.3
    - pyyaml==6.0.3
    - tqdm==4.67.3
